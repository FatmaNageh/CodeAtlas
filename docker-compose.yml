services:
  neo4j:
    image: neo4j:5.26
    container_name: codeatlas-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/Password123
      NEO4J_PLUGINS: '["apoc", "genai"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p Password123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    image: node:22-bookworm
    working_dir: /workspace
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - apps/server/.env
    environment:
      PORT: "3000"
      CORS_ORIGIN: http://localhost:3001
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: Password123
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
    command: >
      bash -lc "
      corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter server dev
      "

  web:
    image: node:22-bookworm
    working_dir: /workspace
    depends_on:
      - server
    environment:
      VITE_SERVER_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
    command: >
      bash -lc "
      corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter web dev -- --host 0.0.0.0
      "

volumes:
  neo4j_data:
  neo4j_logs:
  pnpm_store:
